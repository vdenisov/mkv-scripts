name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so the 'upstream' leg picks up new MKVToolNix releases and
    # catches regressions without any commits to this repo
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported environment
          - groovy: "3.0.25"
            java: "11"
            mkvtoolnix: distro
          # Current environment
          - groovy: "5.0.6"
            java: "21"
            mkvtoolnix: distro
          # Newest MKVToolNix from the upstream apt repo — regression canary
          - groovy: "5.0.6"
            java: "21"
            mkvtoolnix: upstream
    name: Groovy ${{ matrix.groovy }} / JDK ${{ matrix.java }} / mkvtoolnix ${{ matrix.mkvtoolnix }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Install MKVToolNix (${{ matrix.mkvtoolnix }})
        run: |
          if [ "${{ matrix.mkvtoolnix }}" = "upstream" ]; then
            sudo mkdir -p /etc/apt/keyrings
            sudo wget -q -O /etc/apt/keyrings/gpg-pub-moritzbunkus.gpg https://mkvtoolnix.download/gpg-pub-moritzbunkus.gpg
            echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/gpg-pub-moritzbunkus.gpg] https://mkvtoolnix.download/ubuntu/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/mkvtoolnix.download.list
          fi
          sudo apt-get update
          sudo apt-get install -y mkvtoolnix
          mkvmerge --version

      - name: Cache Groovy distribution
        uses: actions/cache@v6
        with:
          path: ~/groovy
          key: groovy-${{ matrix.groovy }}

      - name: Install Groovy
        run: |
          if [ ! -d "$HOME/groovy/groovy-${{ matrix.groovy }}" ]; then
            curl -fsSL -o /tmp/groovy.zip "https://archive.apache.org/dist/groovy/${{ matrix.groovy }}/distribution/apache-groovy-binary-${{ matrix.groovy }}.zip"
            mkdir -p "$HOME/groovy"
            unzip -q /tmp/groovy.zip -d "$HOME/groovy"
          fi
          echo "$HOME/groovy/groovy-${{ matrix.groovy }}/bin" >> "$GITHUB_PATH"

      - name: Cache Grapes
        uses: actions/cache@v6
        with:
          path: ~/.groovy/grapes
          key: grapes-${{ matrix.groovy }}-${{ hashFiles('src/**/*.groovy') }}
          restore-keys: |
            grapes-${{ matrix.groovy }}-

      - name: Run tests
        run: groovy src/test/run_tests.groovy

  # The live TheMovieDB contract test answers "has the API changed shape", which
  # is a weekly-signal question. Deliberately kept off push and PR: network
  # flakiness that reddens the badge on every push trains you to ignore the
  # badge, which is worse than having no badge at all.
  #
  # The test skips itself when no key is resolvable, so this job passes rather
  # than fails when TMDB_API_KEY is unset — which is also what happens on PRs
  # from forks, where GitHub withholds secrets by design.
  live-contract:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: TheMovieDB live contract
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # run_tests.groovy requires mkvmerge at startup even when filtered down to
      # a single test that does not use it
      - name: Install MKVToolNix
        run: |
          sudo apt-get update
          sudo apt-get install -y mkvtoolnix

      - name: Cache Groovy distribution
        uses: actions/cache@v6
        with:
          path: ~/groovy
          key: groovy-5.0.6

      - name: Install Groovy
        run: |
          if [ ! -d "$HOME/groovy/groovy-5.0.6" ]; then
            curl -fsSL -o /tmp/groovy.zip "https://archive.apache.org/dist/groovy/5.0.6/distribution/apache-groovy-binary-5.0.6.zip"
            mkdir -p "$HOME/groovy"
            unzip -q /tmp/groovy.zip -d "$HOME/groovy"
          fi
          echo "$HOME/groovy/groovy-5.0.6/bin" >> "$GITHUB_PATH"

      - name: Cache Grapes
        uses: actions/cache@v6
        with:
          path: ~/.groovy/grapes
          key: grapes-5.0.6-${{ hashFiles('src/**/*.groovy') }}
          restore-keys: |
            grapes-5.0.6-

      - name: Run live contract test
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: groovy src/test/run_tests.groovy --filter 37_fetch_episodes_live_contract
