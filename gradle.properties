# Single source of truth for the project version and every pinned dependency/plugin
# version. build.gradle.kts and settings.gradle.kts read these — do not hardcode
# versions in the build scripts.

# Project version. Stays a snapshot until the 2.0.0 release stamps the real number.
# Surfaced at runtime via the generated org.plukh.mkvtool.BuildInfo.
version=2.0.0-SNAPSHOT

# Toolchain / dependency / plugin pins.
kotlinVersion=2.4.10
picocliVersion=4.7.7
kotestVersion=6.2.3
shadowVersion=9.6.1
# GraalVM native-build-tools: provides the nativeCompile task. Needed to build the
# distributed native binaries; ordinary build/test/installDist do not use it.
graalvmNativeVersion=1.1.6

# Build performance.
org.gradle.parallel=true
org.gradle.caching=true
